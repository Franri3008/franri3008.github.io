<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Habits Wheel</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <h1 class="title">Weekly healthy habits</h1>
    <div class="counter" id="counter">0 / 10</div>
    <button class="skip-button" id="skipButton" type="button">Skip</button>
    <div class="scene">
        <div class="wheel" id="wheel"></div>
    </div>
    <div class="visited-history" id="visitedHistory" aria-live="polite">
        <div class="visited-history-track" id="visitedHistoryTrack"></div>
    </div>
    <div class="summary" id="summary"></div>
    <canvas id="particles"></canvas>

    <script>
        // ─── Animated Background ───────────────────────────────────────────
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');

        function sizeBgCanvas() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        sizeBgCanvas();

        // Floating light orbs
        const orbs = [];
        const ORB_COLORS = [
            { r: 108, g: 92, b: 231, a: 0.08 },   // purple
            { r: 0, g: 184, b: 148, a: 0.07 },   // green
            { r: 162, g: 155, b: 254, a: 0.06 },   // light purple
            { r: 85, g: 239, b: 196, a: 0.06 },   // mint
            { r: 255, g: 215, b: 0, a: 0.04 },   // gold
            { r: 253, g: 121, b: 168, a: 0.05 },   // pink
        ];

        for (let i = 0; i < 8; i++) {
            const col = ORB_COLORS[i % ORB_COLORS.length];
            orbs.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                radius: 150 + Math.random() * 250,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.3,
                color: col,
                phase: Math.random() * Math.PI * 2,
                pulseSpeed: 0.005 + Math.random() * 0.008
            });
        }

        function drawBackground(time) {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            // Base fill
            bgCtx.fillStyle = '#f5f7fa';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            for (const orb of orbs) {
                orb.x += orb.vx;
                orb.y += orb.vy;
                orb.phase += orb.pulseSpeed;

                // Bounce off edges softly
                if (orb.x < -orb.radius) orb.x = bgCanvas.width + orb.radius;
                if (orb.x > bgCanvas.width + orb.radius) orb.x = -orb.radius;
                if (orb.y < -orb.radius) orb.y = bgCanvas.height + orb.radius;
                if (orb.y > bgCanvas.height + orb.radius) orb.y = -orb.radius;

                const pulse = 0.7 + 0.3 * Math.sin(orb.phase);
                const r = orb.radius * pulse;
                const alpha = orb.color.a * pulse;

                const grad = bgCtx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, r);
                grad.addColorStop(0, `rgba(${orb.color.r}, ${orb.color.g}, ${orb.color.b}, ${alpha})`);
                grad.addColorStop(1, `rgba(${orb.color.r}, ${orb.color.g}, ${orb.color.b}, 0)`);
                bgCtx.fillStyle = grad;
                bgCtx.fillRect(orb.x - r, orb.y - r, r * 2, r * 2);
            }

            requestAnimationFrame(drawBackground);
        }
        requestAnimationFrame(drawBackground);
        window.addEventListener('resize', sizeBgCanvas);

        // ─── Particle Engine ───────────────────────────────────────────────
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animatingParticles = false;

        const GLITTER_COLORS = [
            '#FFD700', '#FF6B6B', '#4ECDC4', '#FF69B4',
            '#7B68EE', '#FFA500', '#00CED1', '#FF1493',
            '#ADFF2F', '#FF4500'
        ];

        function sizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        sizeCanvas();
        window.addEventListener('resize', sizeCanvas);

        class Particle {
            constructor(x, y, opts = {}) {
                this.x = x;
                this.y = y;
                this.vx = opts.vx ?? (Math.random() - 0.5) * 14;
                this.vy = opts.vy ?? (Math.random() - 0.5) * 14 - 5;
                this.gravity = opts.gravity ?? 0.18;
                this.life = 1.0;
                this.decay = opts.decay ?? (0.012 + Math.random() * 0.012);
                this.size = opts.size ?? (2.5 + Math.random() * 5);
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 18;
                this.color = opts.color ?? GLITTER_COLORS[Math.floor(Math.random() * GLITTER_COLORS.length)];
                this.shape = opts.shape ?? Math.floor(Math.random() * 3);
                this.shimmer = Math.random() * Math.PI * 2;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
                this.size *= 0.995;
                this.shimmer += 0.3;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save();
                const shimmerAlpha = 0.6 + 0.4 * Math.sin(this.shimmer);
                ctx.globalAlpha = this.life * shimmerAlpha;
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.fillStyle = this.color;

                if (this.shape === 0) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.shape === 1) {
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(this.size * 0.7, 0);
                    ctx.lineTo(0, this.size);
                    ctx.lineTo(-this.size * 0.7, 0);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    drawStar(ctx, 0, 0, 4, this.size, this.size * 0.4);
                }
                ctx.restore();
            }
        }

        function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
            let rot = (Math.PI / 2) * 3;
            const step = Math.PI / spikes;
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerR);
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
                rot += step;
                ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
                rot += step;
            }
            ctx.closePath();
            ctx.fill();
        }

        function triggerParticles(card) {
            const rect = card.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(cx, cy));
            }

            for (let i = 0; i < 28; i++) {
                const angle = (i / 28) * Math.PI * 2;
                const speed = 7 + Math.random() * 4;
                particles.push(new Particle(cx, cy, {
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    gravity: 0.06,
                    decay: 0.02 + Math.random() * 0.015,
                    size: 4 + Math.random() * 4,
                    color: Math.random() > 0.5 ? '#FFD700' : '#FFFFFF',
                    shape: 2
                }));
            }

            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(cx + (Math.random() - 0.5) * 60, cy, {
                    vx: (Math.random() - 0.5) * 3,
                    vy: -8 - Math.random() * 8,
                    gravity: 0.08,
                    decay: 0.01 + Math.random() * 0.008,
                    size: 1.5 + Math.random() * 3,
                    shape: 0
                }));
            }

            if (!animatingParticles) {
                animatingParticles = true;
                animateParticles();
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0);
            for (const p of particles) {
                p.update();
                p.draw(ctx);
            }
            if (particles.length > 0) {
                requestAnimationFrame(animateParticles);
            } else {
                animatingParticles = false;
            }
        }

        // ─── Wheel Builder ─────────────────────────────────────────────────
        const wheel = document.getElementById('wheel');
        const counterEl = document.getElementById('counter');
        const summaryEl = document.getElementById('summary');
        const skipButton = document.getElementById('skipButton');
        const visitedHistoryEl = document.getElementById('visitedHistory');
        const visitedHistoryTrackEl = document.getElementById('visitedHistoryTrack');
        const STEP_ANGLE = 36;
        const RADIUS = 420;

        function buildWheel(tasks) {
            tasks.forEach((task, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.style.transform = `rotateY(${i * STEP_ANGLE}deg) translateZ(${RADIUS}px)`;
                wrapper.dataset.index = i;

                const card = document.createElement('div');
                card.className = 'card';

                const pct = task.goal > 0 ? Math.round((task.progress / task.goal) * 100) : 0;
                const isComplete = task.progress >= task.goal;

                card.innerHTML = `
          <div class="checkmark">
            <svg viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="16" />
              <path d="M11 18 l5 5 l9 -10" />
            </svg>
          </div>
          <span class="card-pill">${task.pillar ?? 'General'}</span>
          <span class="card-icon">${task.icon}</span>
          <span class="card-text">${task.task}</span>
          <div class="progress-container">
            <div class="progress-bar" data-target="${pct}" data-complete="${isComplete}"></div>
          </div>
          <span class="progress-label">${task.progress} / ${task.goal}</span>
        `;

                wrapper.appendChild(card);
                wheel.appendChild(wrapper);
            });
        }

        // ─── Animation Sequencer ───────────────────────────────────────────
        const SPIN_DURATION = 560;
        const PAUSE_AT_FOCUS = 1050;
        let completedCount = 0;
        let pendingTimers = [];
        let animationDone = false;
        let visitedIndices = new Set();

        function schedule(fn, delay) {
            const timerId = setTimeout(() => {
                pendingTimers = pendingTimers.filter(id => id !== timerId);
                fn();
            }, delay);
            pendingTimers.push(timerId);
            return timerId;
        }

        function clearPendingTimers() {
            pendingTimers.forEach(clearTimeout);
            pendingTimers = [];
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            })[char]);
        }

        function buildSummaryReport(tasks) {
            const totalGoal = tasks.reduce((sum, task) => sum + task.goal, 0);
            const totalProgress = tasks.reduce((sum, task) => sum + Math.min(task.progress, task.goal), 0);
            const completionRate = totalGoal > 0 ? Math.round((totalProgress / totalGoal) * 100) : 0;
            const inProgressCount = tasks.filter(task => task.progress > 0 && task.progress < task.goal).length;
            const attentionCount = tasks.filter(task => task.progress === 0).length;

            const pillarStats = tasks.reduce((acc, task) => {
                const key = task.pillar ?? 'General';
                if (!acc[key]) {
                    acc[key] = { goal: 0, progress: 0 };
                }
                acc[key].goal += task.goal;
                acc[key].progress += Math.min(task.progress, task.goal);
                return acc;
            }, {});

            const pillarRows = Object.entries(pillarStats)
                .map(([pillar, stats]) => {
                    const pct = stats.goal > 0 ? Math.round((stats.progress / stats.goal) * 100) : 0;
                    return `
            <div class="summary-pillar-row">
              <span class="summary-pillar-name">${escapeHtml(pillar)}</span>
              <span class="summary-pillar-value">${stats.progress} / ${stats.goal}</span>
              <div class="summary-pillar-track">
                <div class="summary-pillar-fill" style="width: ${pct}%"></div>
              </div>
            </div>
          `;
                })
                .join('');

            summaryEl.innerHTML = `
        <div class="summary-eyebrow">Picnic weekly progress</div>
        <div class="summary-headline">${completedCount} of ${tasks.length} basket goals reached</div>
        <div class="summary-subline">${completionRate}% of the total plan is already covered across affordability, freshness and lower-waste choices.</div>
        <div class="summary-progress-track">
          <div class="summary-progress-fill" style="width: ${completionRate}%"></div>
        </div>
        <div class="summary-stats">
          <div class="summary-stat">
            <strong>${completedCount}</strong>
            <span>Completed</span>
          </div>
          <div class="summary-stat">
            <strong>${inProgressCount}</strong>
            <span>In progress</span>
          </div>
          <div class="summary-stat">
            <strong>${attentionCount}</strong>
            <span>Not started</span>
          </div>
        </div>
        <div class="summary-pillar-grid">${pillarRows}</div>
      `;
        }

        function appendVisitedCard(task, index) {
            if (visitedIndices.has(index)) return;
            visitedIndices.add(index);

            const pct = task.goal > 0 ? Math.round((task.progress / task.goal) * 100) : 0;
            const isComplete = task.progress >= task.goal;
            const item = document.createElement('article');
            item.className = `visited-card${isComplete ? ' completed' : ''}`;
            item.setAttribute('aria-label', `${task.task}: ${task.progress} of ${task.goal}`);
            item.title = task.task;
            item.innerHTML = `
                <span class="visited-card-icon">${task.icon}</span>
                <div class="visited-card-copy">
                    <span class="visited-card-title">${escapeHtml(task.task)}</span>
                    <span class="visited-card-progress">${task.progress} / ${task.goal}</span>
                </div>
                <div class="visited-card-bar">
                    <div class="visited-card-fill${isComplete ? ' complete' : ''}" style="width: ${pct}%"></div>
                </div>
            `;

            visitedHistoryTrackEl.appendChild(item);
            visitedHistoryEl.classList.add('visible');
            visitedHistoryEl.classList.remove('hidden');
            visitedHistoryTrackEl.scrollTo({
                left: visitedHistoryTrackEl.scrollWidth,
                behavior: 'smooth'
            });
        }

        function hideVisitedHistory() {
            visitedHistoryEl.classList.remove('visible');
            visitedHistoryEl.classList.add('hidden');
        }

        function animateProgressBar(card, task) {
            const bar = card.querySelector('.progress-bar');
            const targetPct = parseInt(bar.dataset.target);
            const isComplete = bar.dataset.complete === 'true';

            if (targetPct > 0) {
                bar.classList.add('animating');
                // Animate the bar width
                requestAnimationFrame(() => {
                    bar.style.width = targetPct + '%';
                    if (isComplete) {
                        bar.classList.add('complete');
                    }
                });
            }

            return isComplete;
        }

        function syncFinalCardState(wrapper, task) {
            const card = wrapper.querySelector('.card');
            const bar = card.querySelector('.progress-bar');
            const checkmark = card.querySelector('.checkmark');
            const targetPct = task.goal > 0 ? Math.round((task.progress / task.goal) * 100) : 0;
            const isComplete = task.progress >= task.goal;

            wrapper.classList.remove('focused', 'uncompleted-focus');
            bar.classList.remove('animating');
            bar.style.width = `${targetPct}%`;
            bar.classList.toggle('complete', isComplete);
            wrapper.classList.toggle('completed', isComplete);
            checkmark.classList.toggle('check-animate', isComplete);
        }

        function skipToEnd(tasks) {
            if (animationDone) return;

            clearPendingTimers();
            completedCount = tasks.filter(task => task.progress >= task.goal).length;
            counterEl.textContent = `${completedCount} / ${tasks.length}`;
            counterEl.classList.add('visible');

            document.querySelectorAll('.card-wrapper').forEach((wrapper, index) => {
                syncFinalCardState(wrapper, tasks[index]);
            });

            hideVisitedHistory();
            finalSummary(tasks);
        }

        function startAnimation(tasks) {
            let currentIndex = 0;

            function next() {
                if (animationDone) return;

                const targetAngle = -currentIndex * STEP_ANGLE;
                wheel.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.25, 0.1, 0.25, 1)`;
                wheel.style.transform = `rotateY(${targetAngle}deg)`;

                schedule(() => {
                    if (animationDone) return;

                    const wrappers = document.querySelectorAll('.card-wrapper');
                    const wrapper = wrappers[currentIndex];
                    const card = wrapper.querySelector('.card');

                    wrappers.forEach(w => w.classList.remove('focused', 'uncompleted-focus'));
                    wrapper.classList.add('focused');

                    // Always animate the progress bar
                    schedule(() => {
                        if (animationDone) return;

                        const isComplete = animateProgressBar(card, tasks[currentIndex]);

                        if (isComplete) {
                            // Wait for bar to fill, then celebrate
                            schedule(() => {
                                if (animationDone) return;

                                wrapper.classList.add('completed');
                                const checkmark = card.querySelector('.checkmark');
                                checkmark.classList.add('check-animate');
                                triggerParticles(card);
                                completedCount++;
                                counterEl.textContent = `${completedCount} / ${tasks.length}`;
                                counterEl.classList.add('visible');
                            }, 500);
                        } else if (tasks[currentIndex].progress === 0) {
                            // No progress at all: shake
                            wrapper.classList.add('uncompleted-focus');
                        }
                        // If partial progress (not zero, not complete): just show the bar animating, no shake
                    }, 150);

                    schedule(() => {
                        if (animationDone) return;

                        appendVisitedCard(tasks[currentIndex], currentIndex);
                        currentIndex++;
                        if (currentIndex < tasks.length) {
                            next();
                        } else {
                            finalSummary(tasks);
                        }
                    }, PAUSE_AT_FOCUS);

                }, SPIN_DURATION);
            }

            schedule(next, 600);
        }

        function finalSummary(tasks) {
            if (animationDone) return;
            animationDone = true;
            clearPendingTimers();

            const wrappers = document.querySelectorAll('.card-wrapper');
            wrappers.forEach(w => w.classList.remove('focused', 'uncompleted-focus'));
            skipButton.classList.add('hidden');
            skipButton.disabled = true;
            hideVisitedHistory();

            buildSummaryReport(tasks);
            schedule(() => summaryEl.classList.add('visible'), 300);

            // Set final angle and start gentle spin — cards stay sharp
            const finalAngle = -(tasks.length - 1) * STEP_ANGLE;
            wheel.style.transition = 'none';
            wheel.style.setProperty('--final-angle', `${finalAngle}deg`);

            schedule(() => {
                wheel.style.transform = '';
                wheel.classList.add('slow-spin');
                document.body.classList.add('report-mode');
            }, 400);

            // Final celebration burst
            schedule(() => {
                const scene = document.querySelector('.scene');
                const rect = scene.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;

                for (let wave = 0; wave < 3; wave++) {
                    schedule(() => {
                        for (let i = 0; i < 60; i++) {
                            particles.push(new Particle(
                                cx + (Math.random() - 0.5) * 200,
                                cy + (Math.random() - 0.5) * 100,
                                {
                                    vx: (Math.random() - 0.5) * 18,
                                    vy: -6 - Math.random() * 10,
                                    gravity: 0.12,
                                    decay: 0.008 + Math.random() * 0.008,
                                    size: 3 + Math.random() * 5
                                }
                            ));
                        }
                        if (!animatingParticles) {
                            animatingParticles = true;
                            animateParticles();
                        }
                    }, wave * 300);
                }
            }, 600);
        }

        // ─── Init ──────────────────────────────────────────────────────────
        async function init() {
            try {
                const res = await fetch('data.json');
                const tasks = await res.json();
                buildWheel(tasks);
                skipButton.addEventListener('click', () => skipToEnd(tasks));
                const handleKeydown = (e) => {
                    if (e.code === 'Space' || e.key === ' ') {
                        startAnimation(tasks);
                        document.removeEventListener('keydown', handleKeydown);
                    }
                };
                document.addEventListener('keydown', handleKeydown);
            } catch (err) {
                document.body.innerHTML = `<p style="color:#e74c3c;font-size:1.2rem;text-align:center;margin-top:40vh;">
          Failed to load data. Make sure to serve this page via a local server.<br>
          <code>npx serve .</code> or <code>python3 -m http.server</code>
        </p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
