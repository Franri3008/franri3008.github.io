<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Aura Points Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    /* ─── TOKENS ─── */
    :root {
      --fs-control:  clamp(9px, 1.4vw, 13px);
      --fs-legend:   clamp(0.625rem, 1.4vw, 1rem);
      --fs-meta:     clamp(10px, 1.6vw, 16px);
      --fs-slider:   clamp(11px, 1.2vw, 13px);
      --breakpoint-compact: 500px;
    }

    /* ─── BASE ─── */
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif;
      background-color: white;
    }

    /* ─── LAYOUT GRID ─── */
    .viz-grid {
      display: grid;
      grid-template-rows: 16fr 1fr 1fr;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      padding-bottom: clamp(8px, 2vh, 18px);
    }
    #container1 { grid-row: 1; grid-column: 1 / span 2; overflow: hidden; min-height: 0; }
    #container2 { grid-row: 2; grid-column: 1 / span 2; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #container3 { grid-row: 3; grid-column: 1; display: flex; align-items: center; justify-content: flex-start; padding: 0 20px; overflow: hidden; min-width: 0; }
    #container4 { grid-row: 3; grid-column: 2; display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; overflow: hidden; min-width: 0; }
    #container4 a { height: 100%; display: flex; align-items: center; cursor: default; }

    /* ─── CHART CANVAS ─── */
    #viz { width: 100%; height: 100%; min-height: 0; min-width: 0; }
    #chart { display: block; width: 100%; height: 100%; }

    /* ─── CHART ELEMENTS (D3) ─── */
    .axis path, .axis line { stroke: #cfd2d7; }
    .tick text { font-weight: 600; fill: #4b5563; }
    .grid-lines line { stroke: #DBDBDB; stroke-dasharray: 2, 3; }
    .grid-lines path { stroke: none; }
    .bar-label { fill: #555; font-weight: 500; }

    /* ─── TOOLTIP ─── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #fff;
      color: #0f172a;
      border: 1px solid rgba(17, 24, 39, 0.08);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
      opacity: 0;
      transition: opacity 0.15s ease;
      max-width: 240px;
      z-index: 100;
    }

    /* ─── SOURCE + LOGO ─── */
    .logo {
      height: 100%;
      width: auto;
      max-height: 100%;
      max-width: 100%;
      pointer-events: auto;
      object-fit: contain;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-height: 500px) {
      .viz-grid { grid-template-rows: 1fr !important; grid-template-columns: 1fr !important; padding-bottom: 0; }
      #container1 { grid-row: 1 !important; grid-column: 1 !important; }
      #container2, #container3, #container4, #container5 { display: none !important; }
      .legend, .source-text, .logo, .footnote-text { display: none !important; }
    }
  </style>
</head>
<body>
<div class="viz-grid">
  <div id="container1" class="container viz-container">
    <div id="viz"></div>
  </div>
  <div id="container4" class="container logo-container">
    <a href="https://aiworld.eu/" target="_blank" rel="noopener">
      <img src="https://aiworld.eu/logo-transparent.svg" class="logo" alt="AI World logo">
    </a>
  </div>
</div>

<script>
// Chart behavior
const LINE_SHOW_DOTS = 0;
const SHOW_TOOLTIP = 1;
const SHOW_CONTAINER_2 = 0;
const SHOW_CONTAINER_3 = 0;
const SHOW_CONTAINER_4 = 1;
const SHOW_CONTAINER_5 = 0;

// Metadata — ponytail: joke chart, no source by design
// Colors assigned by series name, photos by name too
const PEOPLE = {
  cristina:  { color: "#2756d3", photo: "cristina.jpg" },
  gaia:      { color: "#10b981", photo: "gaia.jpg" },
  francisco: { color: "#E53229", photo: "francisco.jpg" },
};
const BREAKPOINT_COMPACT = 500; // px; MUST equal --breakpoint-compact

(function applyContainerVisibility() {
  const vizGrid = document.querySelector('.viz-grid');
  vizGrid.style.gridTemplateRows = '19fr 1fr';
  document.getElementById('container1').style.gridRow = '1';
  const c4 = document.getElementById('container4');
  c4.style.gridRow = '2';
  c4.style.gridColumn = '1 / span 2';
})();

function parseNum(value) {
  if (value == null || value === "") return 0;
  const n = Number(String(value).replace(/,/g, ""));
  return Number.isFinite(n) ? n : 0;
}

function smartFormat(v) {
  if (!isFinite(v)) return "N/A";
  if (Math.floor(v) === v) return d3.format(",")(v);
  return d3.format(",.1f")(v);
}

const vizContainer = document.getElementById("viz");
const parseDate = d3.utcParse("%Y-%m-%d");
const fmtDate = d3.utcFormat("%b %d");
let allData = [];

// Tooltip (created once)
const tooltip = document.createElement("div");
tooltip.id = "tooltip";
document.body.appendChild(tooltip);

function render() {
  while (vizContainer.firstChild) vizContainer.removeChild(vizContainer.firstChild);
  if (!allData.length) return;

  // .today(): only show points up to today — one new point per day
  const today = new Date();
  const todayUTC = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
  const data = allData.filter(d => d.date.getTime() <= todayUTC);
  if (!data.length) return;

  const rect = vizContainer.getBoundingClientRect();
  const width = Math.max(320, rect.width);
  const height = Math.max(220, rect.height);
  const compact = window.matchMedia(`(max-height:${BREAKPOINT_COMPACT}px)`).matches;

  const yLabelWidth = Math.max(3 * 7.5, 28) + 16;
  const photoR = Math.max(16, Math.min(28, width * 0.03));
  const rightMargin = Math.max(24, photoR * 2 + 16); // room for the photo circle
  const bottomMargin = Math.max(28, height * 0.07);
  const margin = { top: Math.max(16, photoR + 8), right: rightMargin, bottom: bottomMargin, left: yLabelWidth + 32 };
  const innerWidth = Math.max(40, width - margin.left - margin.right);
  const innerHeight = Math.max(40, height - margin.top - margin.bottom);

  const svg = d3.select(vizContainer).append("svg")
    .attr("width", width)
    .attr("height", height)
    .attr("viewBox", `0 0 ${width} ${height}`)
    .style("width", "100%")
    .style("height", "100%");

  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const xScale = d3.scaleUtc()
    .domain(d3.extent(data, d => d.date))
    .range([0, innerWidth]);
  const yScale = d3.scaleLinear().domain([0, 100]).range([innerHeight, 0]);

  // Grid lines
  g.append("g")
    .attr("class", "grid-lines")
    .call(d3.axisLeft(yScale).ticks(compact ? 4 : 5).tickSize(-innerWidth).tickFormat(""))
    .select(".domain").remove();

  const tickCount = Math.max(3, Math.floor(innerWidth / 90));
  const axisFont = Math.max(9, Math.min(13, innerWidth / Math.max(5, tickCount) * 0.5));

  g.append("g")
    .attr("class", "axis")
    .attr("transform", `translate(0,${innerHeight})`)
    .call(d3.axisBottom(xScale).ticks(tickCount).tickFormat(fmtDate))
    .selectAll("text")
    .style("font-size", `${axisFont}px`)
    .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif");

  const yAxisG = g.append("g")
    .attr("class", "axis")
    .call(d3.axisLeft(yScale).ticks(compact ? 4 : 5));
  yAxisG.selectAll("text")
    .style("font-size", `${axisFont}px`)
    .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif");

  yAxisG.append("text")
    .attr("transform", "rotate(-90)")
    .attr("y", -margin.left + 16)
    .attr("x", -(innerHeight / 2))
    .attr("dy", "0.71em")
    .attr("text-anchor", "middle")
    .style("fill", "#000")
    .style("font-weight", "700")
    .style("font-size", "clamp(12px, 1.5vw, 18px)")
    .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif")
    .text("Aura points");

  // Today mark: dashed vertical line + label at the shared line end
  const last = data[data.length - 1];
  const lx = xScale(last.date);

  g.append("line")
    .attr("x1", lx).attr("x2", lx)
    .attr("y1", 0).attr("y2", innerHeight)
    .attr("stroke", "#94a3b8")
    .attr("stroke-width", 1)
    .attr("stroke-dasharray", "4,4");

  g.append("text")
    .attr("x", lx)
    .attr("y", -6)
    .attr("text-anchor", "middle")
    .style("fill", "#64748b")
    .style("font-weight", "700")
    .style("font-size", `${axisFont}px`)
    .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif")
    .text("Today");

  // One line + end photo circle per person
  const defs = svg.append("defs");
  const names = Object.keys(PEOPLE);
  const lineGen = name => d3.line()
    .x(d => xScale(d.date))
    .y(d => yScale(d[name]))
    .curve(d3.curveMonotoneX)
    .defined(d => d.date != null && !isNaN(d[name]));

  names.forEach(name => {
    const { color, photo } = PEOPLE[name];
    g.append("path")
      .datum(data)
      .attr("class", "line-path")
      .attr("fill", "none")
      .attr("stroke", color)
      .attr("stroke-width", 2.5)
      .attr("stroke-linejoin", "round")
      .attr("stroke-linecap", "round")
      .attr("d", lineGen(name));

    const ly = yScale(last[name]);
    defs.append("clipPath")
      .attr("id", `photo-clip-${name}`)
      .append("circle")
      .attr("cx", margin.left + lx)
      .attr("cy", margin.top + ly)
      .attr("r", photoR);

    svg.append("image")
      .attr("href", photo)
      .attr("x", margin.left + lx - photoR)
      .attr("y", margin.top + ly - photoR)
      .attr("width", photoR * 2)
      .attr("height", photoR * 2)
      .attr("preserveAspectRatio", "xMidYMid slice")
      .attr("clip-path", `url(#photo-clip-${name})`);

    svg.append("circle")
      .attr("cx", margin.left + lx)
      .attr("cy", margin.top + ly)
      .attr("r", photoR)
      .attr("fill", "none")
      .attr("stroke", color)
      .attr("stroke-width", 3);
  });

  // Tooltip via invisible hover overlay
  if (SHOW_TOOLTIP) {
    const bisect = d3.bisector(d => d.date).center;
    g.append("rect")
      .attr("width", innerWidth)
      .attr("height", innerHeight)
      .attr("fill", "transparent")
      .on("mousemove", (event) => {
        const [mx] = d3.pointer(event);
        const d = data[bisect(data, xScale.invert(mx))];
        const rowsHtml = Object.keys(PEOPLE)
          .sort((a, b) => d[b] - d[a])
          .map(n => `<span style="color:${PEOPLE[n].color};font-weight:600">${n}</span>: ${smartFormat(d[n])}`)
          .join("<br>");
        tooltip.innerHTML = `<strong>${fmtDate(d.date)}</strong><br>${rowsHtml}`;
        tooltip.style.opacity = "1";
        if (event.clientX > window.innerWidth / 2) {
          tooltip.style.left = (event.clientX - 14 - tooltip.offsetWidth) + "px";
        } else {
          tooltip.style.left = (event.clientX + 14) + "px";
        }
        tooltip.style.top = (event.clientY - 24) + "px";
      })
      .on("mouseleave", () => { tooltip.style.opacity = "0"; });
  }
}

d3.csv("data.csv").then(rows => {
  allData = rows.map(d => {
    const row = { date: parseDate(d.date) };
    Object.keys(PEOPLE).forEach(n => { row[n] = parseNum(d[n]); });
    return row;
  }).filter(d => d.date)
    .sort((a, b) => a.date - b.date);
  render();
});

let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 120);
});
if (typeof ResizeObserver !== "undefined") {
  new ResizeObserver(() => render()).observe(vizContainer);
}
</script>
</body>
</html>
